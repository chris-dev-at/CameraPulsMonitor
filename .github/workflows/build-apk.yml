name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Copy web files to mobile directory
        run: |
          cp index.html mobile/www/
          cp css/style.css mobile/css/
          cp css/icon.svg mobile/css/
          cp js/app.js mobile/js/
      
      - name: Build Docker image
        run: |
          docker build -t pulse-monitor-build mobile
      
      - name: Run container
        run: |
          docker create --name get-apk pulse-monitor-build
      
      - name: Copy APK out
        run: |
          docker cp get-apk:/output/. mobile/output/
          docker rm get-apk
      
      - name: Rename APK
        run: |
          cp mobile/output/app-debug.apk mobile/PulseMonitor.apk
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseMonitor.apk
          path: mobile/PulseMonitor.apk
          retention-days: 30

  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: PulseMonitor.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: PulseMonitor.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
